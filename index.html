<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安否確認システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

  /* ローディング */
  #loading { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
  .spinner { width: 38px; height: 38px; border: 4px solid #e0e0e0; border-top-color: #d32f2f; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #888; font-size: 1.08rem; }

  #app { display: none; }

  /* レイアウト */
  .container { max-width: 560px; margin: 0 auto; padding: 12px 8px; }
  .container.wide { max-width: 1000px; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 16px; margin-bottom: 10px; }

  /* ページヘッダー */
  .page-header { border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; color: #fff; }
  .page-header h1 { font-size: 1.8rem; }
  .page-header .sub { font-size: 1.1rem; opacity: 0.85; margin-top: 4px; }
  .header-safety { background: linear-gradient(135deg,#c62828,#ef5350); }
  .header-view   { background: linear-gradient(135deg,#37474f,#78909c); }

  /* 時刻表示 */
  .datetime { background: rgba(0,0,0,0.06); border-radius: 8px; padding: 11px 12px; text-align: center; font-size: 1.44rem; font-weight: bold; margin-bottom: 16px; color: #333; }

  /* フォーム部品 */
  label { display: block; font-size: 1.2rem; color: #555; margin: 16px 0 6px; }
  input[type=text], input[type=password], textarea {
    width: 100%; padding: 15px 14px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 1.3rem; transition: border 0.2s; background: #fff;
  }
  input:focus, textarea:focus { outline: none; border-color: #c62828; }
  textarea { resize: vertical; min-height: 70px; }

  /* ラジオボタン */
  .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .radio-label { flex: 1; min-width: 90px; border: 2px solid #ddd; border-radius: 8px; padding: 13px 6px; text-align: center; cursor: pointer; font-size: 1.2rem; color: #555; transition: all 0.2s; user-select: none; }
  .radio-label input { display: none; }
  .radio-label.checked { border-color: #c62828; background: #c62828; color: #fff; font-weight: bold; }

  /* 送信ボタン */
  .submit-btn { width: 100%; margin-top: 20px; padding: 18px; border: none; border-radius: 10px; font-size: 1.4rem; font-weight: bold; cursor: pointer; color: #fff; transition: filter 0.2s; background: #c62828; }
  .submit-btn:hover:not(:disabled) { filter: brightness(0.9); }
  .submit-btn:disabled { background: #bbb !important; cursor: not-allowed; }

  /* メッセージ */
  .msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 1.15rem; display: none; text-align: center; }
  .msg.success { background: #e8f5e9; color: #2e7d32; }
  .msg.error   { background: #ffebee; color: #c62828; }

  /* リンクボタン群 */
  .link-group { display: flex; flex-direction: column; gap: 10px; }
  .link-btn { display: block; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; width: 100%; transition: opacity 0.2s; }
  .link-btn:hover { opacity: 0.82; }
  .lb-view { background: #ffebee; color: #b71c1c; border: 1.5px solid #ef9a9a; }
  .lb-back { background: #f5f5f5; color: #555; border: 1.5px solid #ddd; }
  .lb-ext  { background: #e3f2fd; color: #0d47a1; border: 1.5px solid #90caf9; text-decoration: none; }

  /* 安否確認閲覧テーブル */
  .tbl-wrap { overflow-x: auto; margin-top: 8px; }
  .safety-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; white-space: nowrap; }
  .safety-table thead th {
    background: #f5f5f5; color: #555; padding: 10px 12px;
    text-align: left; font-weight: bold; border-bottom: 2px solid #ddd;
    position: sticky; top: 0;
  }
  .safety-table tbody td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  .safety-table tbody tr:hover td { background: #fff8f8; }
  .sc-ok  { color: #2e7d32; font-weight: bold; }
  .sc-ng  { color: #c62828; font-weight: bold; }
  .sc-unk { color: #f57f17; font-weight: bold; }
  .sc-other { white-space: normal; min-width: 120px; font-size: 0.88rem; color: #555; }
  /* 未回答行 */
  .row-unanswered td { background: #fafafa; color: #bbb; }
  .row-unanswered .name-link { color: #bbb; }
  /* 古い回答行（地震前の回答） */
  .row-old td { color: #bbb; }
  .row-old .name-link { color: #aaa; text-decoration: line-through; }
  /* 氏名タップで開く詳細ポップアップ */
  .name-link { color: #1565c0; text-decoration: underline; cursor: pointer; font-weight: bold; white-space: nowrap; }
  .name-link.no-detail { color: var(--color-text-primary); cursor: default; text-decoration: none; }
  #detail-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center; z-index: 9990; padding: 20px;
  }
  #detail-modal.active { display: flex; }
  .detail-box {
    background: #fff; border-radius: 14px; padding: 24px; width: 100%; max-width: 340px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.25);
  }
  .detail-name  { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 4px; }
  .detail-dept  { font-size: 0.88rem; color: #888; margin-bottom: 16px; }
  .detail-row   { display: flex; gap: 10px; margin-bottom: 10px; font-size: 1rem; align-items: flex-start; }
  .detail-lbl   { color: #999; min-width: 80px; font-size: 0.9rem; }
  .detail-val   { color: #333; word-break: break-all; }
  .detail-close { width: 100%; margin-top: 16px; padding: 12px; background: #546e7a; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  .detail-close:hover { background: #455a64; }

  .result-info { font-size: 0.95rem; color: #888; margin-bottom: 8px; }
  .empty { text-align: center; color: #bbb; padding: 30px; font-size: 1.05rem; }
  .alert-banner { background: #ff5252; color: #fff; border-radius: 8px; padding: 10px 14px; text-align: center; font-size: 1.15rem; margin-bottom: 14px; line-height: 1.6; }

  /* ===== 社員番号入力画面 ===== */
  #empid-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg,#7b1b1b,#d32f2f);
    display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
  }
  .empid-box {
    background: #fff; border-radius: 16px; padding: 32px 24px;
    width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .empid-title { font-size: 1.5rem; font-weight: bold; color: #b71c1c; text-align: center; margin-bottom: 4px; }
  .empid-sub   { font-size: 0.88rem; color: #888; text-align: center; margin-bottom: 24px; line-height: 1.7; }
  .empid-sub span { color: #d32f2f; font-weight: bold; }
  .empid-input {
    width: 100%; padding: 16px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 1.35rem; text-align: center; letter-spacing: 0.1em; transition: border 0.2s;
  }
  .empid-input:focus { outline: none; border-color: #d32f2f; }
  .empid-btn {
    width: 100%; margin-top: 20px; padding: 16px; background: #d32f2f; color: #fff;
    border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
  }
  .empid-btn:hover { background: #b71c1c; }
  .empid-btn:disabled { background: #bbb; cursor: not-allowed; }
  .empid-msg { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 1rem; display: none; text-align: center; }
  .empid-msg.error { background: #ffebee; color: #c62828; }

  /* ===== PINモーダル ===== */
  #pin-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 9998; padding: 20px;
  }
  #pin-modal.active { display: flex; }
  .pin-box {
    background: #fff; border-radius: 16px; padding: 28px 24px;
    width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .pin-title { font-size: 1.15rem; font-weight: bold; color: #333; margin-bottom: 4px; }
  .pin-sub   { font-size: 0.88rem; color: #888; margin-bottom: 18px; line-height: 1.5; }
  .pin-input {
    width: 100%; padding: 14px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 1.3rem; text-align: center; letter-spacing: 0.15em; transition: border 0.2s;
  }
  .pin-input:focus { outline: none; border-color: #546e7a; }
  .pin-btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .pin-ok-btn     { flex:1; padding:13px; background:#546e7a; color:#fff; border:none; border-radius:8px; font-size:1.1rem; font-weight:bold; cursor:pointer; }
  .pin-ok-btn:hover     { background:#455a64; }
  .pin-ok-btn:disabled  { background:#bbb; cursor:not-allowed; }
  .pin-cancel-btn { flex:1; padding:13px; background:#f5f5f5; color:#555; border:1.5px solid #ddd; border-radius:8px; font-size:1.1rem; cursor:pointer; }
  .pin-cancel-btn:hover { background:#eee; }
  .pin-msg { margin-top:10px; padding:8px; border-radius:6px; font-size:0.95rem; display:none; text-align:center; }
  .pin-msg.error { background:#ffebee; color:#c62828; }

  /* ===== 訓練モードバナー ===== */
  #drill-banner {
    background: linear-gradient(90deg, #F57F17, #FFA000);
    color: #fff;
    text-align: center;
    padding: 10px 16px;
    font-size: 1rem;
    font-weight: bold;
    display: none;
    letter-spacing: .04em;
  }

  /* ===== リセットモーダル ===== */
  #reset-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: none; align-items: center; justify-content: center;
    z-index: 9997; padding: 20px;
  }
  #reset-modal.active { display: flex; }
  .btn-reset { background: #b71c1c; color: #fff; border: none; }
  .btn-reset:hover { background: #8e1a1a; }

  /* ===== 上部バー ===== */
  #user-bar {
    background: #b71c1c; color: #fff; text-align: center;
    padding: 6px 12px; font-size: 0.9rem; position: sticky; top: 0; z-index: 100; display: none;
  }
</style>
</head>
<body>

<!-- 社員番号入力画面 -->
<div id="empid-screen">
  <div class="empid-box">
    <div class="empid-title">🆘 安否確認システム</div>
    <div class="empid-sub">社員番号を入力してください<br><span>※緊急時はこれだけで報告できます</span></div>
    <input class="empid-input" type="text" id="empid-input" placeholder="例: 00123" autocomplete="off" inputmode="numeric">
    <button class="empid-btn" id="empid-btn" onclick="doEmpIdLogin()">確認する</button>
    <div class="empid-msg" id="empid-msg"></div>
  </div>
</div>

<!-- 詳細ポップアップ（氏名タップ時） -->
<div id="detail-modal">
  <div class="detail-box">
    <div class="detail-name" id="detail-name"></div>
    <div class="detail-dept" id="detail-dept"></div>
    <div class="detail-row"><span class="detail-lbl">社員番号</span><span class="detail-val" id="detail-empid">—</span></div>
    <div class="detail-row"><span class="detail-lbl">役職</span><span class="detail-val" id="detail-position">—</span></div>
    <div class="detail-row"><span class="detail-lbl">📍 住所</span><span class="detail-val" id="detail-address">—</span></div>
    <div class="detail-row"><span class="detail-lbl">📱 携帯</span><span class="detail-val"><a id="detail-mobile" href="#" style="color:#1565c0;text-decoration:none;">—</a></span></div>
    <div class="detail-row"><span class="detail-lbl">✉️ メール</span><span class="detail-val"><a id="detail-email" href="#" style="color:#1565c0;text-decoration:none;word-break:break-all;">—</a></span></div>
    <button class="detail-close" onclick="closeDetailModal()">閉じる</button>
  </div>
</div>

<!-- PINモーダル（閲覧時のみ） -->
<div id="pin-modal">
  <div class="pin-box">
    <div class="pin-title">🔐 PIN認証</div>
    <div class="pin-sub">安否確認結果の閲覧には、PINコードが必要です。<br>PINコードは生年月日（例：19850401）です。</div>
    <input class="pin-input" type="password" id="pin-input" placeholder="PINコード" autocomplete="off">
    <div class="pin-btn-row">
      <button class="pin-cancel-btn" onclick="closePinModal()">キャンセル</button>
      <button class="pin-ok-btn" id="pin-ok-btn" onclick="submitPin()">確認</button>
    </div>
    <div class="pin-msg" id="pin-msg"></div>
  </div>
</div>

<!-- リセットモーダル -->
<div id="reset-modal">
  <div class="pin-box">
    <div class="pin-title">🔄 安否報告のリセット</div>
    <div class="pin-sub">全社員の安否報告データをリセットします。<br>専用パスワードを入力してください。</div>
    <input class="pin-input" type="password" id="reset-input" placeholder="リセットパスワード" autocomplete="off">
    <div class="pin-btn-row">
      <button class="pin-cancel-btn" onclick="closeResetModal()">キャンセル</button>
      <button class="pin-ok-btn btn-reset" id="reset-ok-btn" onclick="submitReset()">リセット実行</button>
    </div>
    <div class="pin-msg" id="reset-msg"></div>
  </div>
</div>

<!-- 上部バー -->
<div id="user-bar">
  <span id="user-bar-name"></span>
</div>

<div id="loading"><div class="spinner"></div><p>読み込み中...</p></div>
<div id="app"></div>

<script>
// =============================================
// ページHTML
// =============================================
var PAGES = {};

// ----- 安否確認 報告 -----
PAGES.safety = `
<div class="container">
  <div class="card page-header header-safety">
    <h1>🆘 安否確認報告</h1>
    <div class="sub">緊急時の状況をできる限り早く報告してください</div>
  </div>
  <div class="card">
    <div class="datetime" id="sf-datetime">--</div>
    <div class="alert-banner">⚠️ 緊急事態発生中 — できる限り早く安否を報告してください</div>

    <label>社員番号</label>
    <input type="text" id="sf-empId" placeholder="例: 00123">

    <label>本人の安否</label>
    <div class="radio-group" id="sf-self-grp">
      <label class="radio-label" onclick="sfCheck(this,'sf-self-grp')"><input type="radio" name="sf_self" value="無事">✅ 無事</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-self-grp')"><input type="radio" name="sf_self" value="軽傷">🤕 軽傷</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-self-grp')"><input type="radio" name="sf_self" value="重傷">🚑 重傷</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-self-grp')"><input type="radio" name="sf_self" value="不明">❓ 不明</label>
    </div>

    <label>家族の安否</label>
    <div class="radio-group" id="sf-family-grp">
      <label class="radio-label" onclick="sfCheck(this,'sf-family-grp')"><input type="radio" name="sf_family" value="全員無事">✅ 全員無事</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-family-grp')"><input type="radio" name="sf_family" value="負傷者あり">🤕 負傷者あり</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-family-grp')"><input type="radio" name="sf_family" value="不明">❓ 不明</label>
    </div>

    <label>現在の居場所</label>
    <input type="text" id="sf-location" placeholder="例: 自宅、避難所（○○小学校）など">

    <label>出社の可否</label>
    <div class="radio-group" id="sf-work-grp">
      <label class="radio-label" onclick="sfCheck(this,'sf-work-grp')"><input type="radio" name="sf_work" value="出社可能">🏢 出社可能</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-work-grp')"><input type="radio" name="sf_work" value="出社困難">🚫 出社困難</label>
      <label class="radio-label" onclick="sfCheck(this,'sf-work-grp')"><input type="radio" name="sf_work" value="不明">❓ 不明</label>
    </div>

    <label>その他（連絡事項など）</label>
    <textarea id="sf-other" placeholder="自由記入（任意）"></textarea>

    <button class="submit-btn" id="sf-submit" onclick="sfSubmit()">安否を報告する</button>
    <div class="msg" id="sf-msg"></div>
  </div>

  <div class="card">
    <div class="link-group">
      <button class="link-btn lb-view" onclick="requirePin()">📋 安否確認結果を確認する（PIN必要）</button>
      <a class="link-btn lb-ext" href="https://www.nhk.or.jp/bousai/" target="_blank">📡 NHK災害情報（外部）</a>
    </div>
  </div>
</div>`;

// ----- 安否確認 閲覧 -----
PAGES.safety_view = `
<div class="container wide">
  <div id="drill-banner">🟡 訓練モード実施中 — これは安否確認訓練です</div>
  <div class="card page-header header-view">
    <h1>📋 安否確認報告 閲覧</h1>
    <div class="sub">未回答者も含む全員表示</div>
    <div id="sv-origin" style="font-size:0.85rem;opacity:0.8;margin-top:4px;"></div>
  </div>
  <div class="card">
    <div class="result-info" id="sv-info"></div>
    <input type="hidden" id="sv-empId">
    <div class="tbl-wrap">
      <table class="safety-table" id="sv-table" style="display:none;">
        <thead>
          <tr>
            <th>部</th>
            <th>課</th>
            <th>係</th>
            <th>氏名</th>
            <th>本人の安否</th>
            <th>家族の安否</th>
            <th>現在地</th>
            <th>出社</th>
            <th>その他</th>
            <th>報告日時</th>
          </tr>
        </thead>
        <tbody id="sv-tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="sv-empty" style="display:none;">本日の報告データがありません</div>
  </div>
  <div id="sv-reset-area" style="display:none;" class="card">
    <button class="link-btn" style="background:#b71c1c;color:#fff;border:none;" onclick="openResetModal()">🔄 安否報告をリセットする（管理者専用）</button>
  </div>
  <div class="card">
    <div class="link-group">
      <button class="link-btn lb-back" onclick="goPage('safety')">← 安否確認報告に戻る</button>
    </div>
  </div>
</div>`;

// =============================================
// 状態管理
// =============================================
var currentEmpId  = '';  // 社員番号（報告・表示に使用）
var verifiedEmpId = '';  // PIN認証済み社員番号（閲覧に使用）

// =============================================
// 社員番号のみでログイン
// =============================================
function doEmpIdLogin() {
  var empId = (document.getElementById('empid-input').value || '').trim();
  if (!empId) return showEmpIdMsg('社員番号を入力してください。');
  var btn = document.getElementById('empid-btn');
  btn.disabled = true; btn.textContent = '確認中...';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = '確認する';
      if (!res) { showEmpIdMsg('社員番号が見つかりません。'); return; }
      currentEmpId = empId;
      localStorage.setItem('empId', empId);
      document.getElementById('empid-screen').style.display = 'none';
      document.getElementById('user-bar').style.display     = 'block';
      document.getElementById('user-bar-name').textContent  = res.name + '（' + empId + '）';
      goPage('safety');
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = '確認する';
      showEmpIdMsg('エラー: ' + err.message);
    })
    .getEmployee(empId);
}

function showEmpIdMsg(msg) {
  var el = document.getElementById('empid-msg');
  el.textContent = msg; el.className = 'empid-msg error'; el.style.display = 'block';
}

function changeUser() {
  currentEmpId = ''; verifiedEmpId = '';
  localStorage.removeItem('empId');
  document.getElementById('user-bar').style.display     = 'none';
  document.getElementById('empid-input').value          = '';
  document.getElementById('empid-msg').style.display    = 'none';
  document.getElementById('empid-screen').style.display = 'flex';
  document.getElementById('app').innerHTML = '';
}

// =============================================
// PINモーダル（閲覧時のみ）
// =============================================
function requirePin() {
  document.getElementById('pin-input').value          = '';
  document.getElementById('pin-msg').style.display    = 'none';
  document.getElementById('pin-modal').classList.add('active');
  setTimeout(function(){ document.getElementById('pin-input').focus(); }, 100);
}

function closePinModal() {
  document.getElementById('pin-modal').classList.remove('active');
}

function submitPin() {
  var pin = (document.getElementById('pin-input').value || '').trim();
  if (!pin) { showPinMsg('PINコードを入力してください。'); return; }
  var btn = document.getElementById('pin-ok-btn');
  btn.disabled = true; btn.textContent = '確認中...';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = '確認';
      if (!res.success) { showPinMsg(res.message); return; }
      verifiedEmpId = currentEmpId;
      closePinModal();
      goPage('safety_view');
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = '確認';
      showPinMsg('エラー: ' + err.message);
    })
    .verifyPin(currentEmpId, pin);
}

function showPinMsg(msg) {
  var el = document.getElementById('pin-msg');
  el.textContent = msg; el.className = 'pin-msg error'; el.style.display = 'block';
}

// =============================================
// ルーター
// =============================================
var dtTimer = null;

function goPage(page) {
  if (dtTimer) { clearInterval(dtTimer); dtTimer = null; }
  document.getElementById('app').innerHTML = PAGES[page]
    || '<div style="padding:40px;color:#c62828;">ページが見つかりません</div>';
  window.scrollTo(0, 0);
  if (page === 'safety')      sfInit();
  if (page === 'safety_view') svInit();
}

// =============================================
// 共通ユーティリティ
// =============================================
function fmtDateTime() {
  var now = new Date(), w = ['日','月','火','水','木','金','土'];
  return now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()
    +'日（'+w[now.getDay()]+'）'
    +String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
}
function showMsg(id, text, type) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text; el.className = 'msg '+type; el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 4000);
}
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function bindEmpId(inputId) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  inp.value = currentEmpId; inp.readOnly = true;
  inp.style.background = '#f5f5f5'; inp.style.color = '#888';
}

// =============================================
// 安否確認 報告
// =============================================
function sfInit() {
  var el = document.getElementById('sf-datetime');
  if (el) el.textContent = fmtDateTime();
  dtTimer = setInterval(function(){
    var e = document.getElementById('sf-datetime');
    if (e) e.textContent = fmtDateTime(); else clearInterval(dtTimer);
  }, 10000);
  bindEmpId('sf-empId');
}

function sfCheck(lbl, grpId) {
  var grp = document.getElementById(grpId);
  if (!grp) return;
  grp.querySelectorAll('.radio-label').forEach(function(l){ l.classList.remove('checked'); });
  lbl.classList.add('checked');
  var inp = lbl.querySelector('input');
  if (inp) inp.checked = true;
}

function sfGetRadio(name) {
  var el = document.querySelector('input[name="'+name+'"]:checked');
  return el ? el.value : '';
}

var sfSubmitting = false; // 多重送信防止フラグ
function sfSubmit() {
  if (sfSubmitting) return; // 送信中の多重送信を防止
  var empId        = ((document.getElementById('sf-empId')    ||{}).value||'').trim();
  var selfStatus   = sfGetRadio('sf_self');
  var familyStatus = sfGetRadio('sf_family');
  var location     = ((document.getElementById('sf-location') ||{}).value||'').trim();
  var canWork      = sfGetRadio('sf_work');
  var other        = ((document.getElementById('sf-other')    ||{}).value||'').trim();
  if (!empId)      return showMsg('sf-msg','社員番号を入力してください。','error');
  if (!selfStatus) return showMsg('sf-msg','本人の安否を選択してください。','error');
  sfSubmitting = true;
  var btn = document.getElementById('sf-submit');
  btn.disabled = true; btn.textContent = '送信中...';
  google.script.run
    .withSuccessHandler(function(res){
      sfSubmitting = false;
      btn.disabled = false; btn.textContent = '安否を報告する';
      showMsg('sf-msg', res.success ? '✅ '+res.message : '❌ '+res.message,
              res.success ? 'success' : 'error');
    })
    .withFailureHandler(function(err){
      sfSubmitting = false;
      btn.disabled = false; btn.textContent = '安否を報告する';
      showMsg('sf-msg','❌ '+err.message,'error');
    })
    .submitSafety({ empId:empId, selfStatus:selfStatus, familyStatus:familyStatus,
                    location:location, canWork:canWork, other:other });
}

// =============================================
// 安否確認 閲覧（PIN認証済み後のみ）
// =============================================
function svInit() {
  var inp = document.getElementById('sv-empId');
  if (inp && verifiedEmpId) { inp.value = verifiedEmpId; svLoad(); }
  // 閲覧区分1の社員のみリセットボタンを表示
  google.script.run
    .withSuccessHandler(function(emp) {
      var area = document.getElementById('sv-reset-area');
      if (area && emp && String(emp.viewDiv) === '1') area.style.display = 'block';
    })
    .getEmployee(verifiedEmpId);
}

function svStatusClass(val) {
  if (!val) return '';
  if (val.indexOf('無事')>=0 || val==='出社可能' || val==='全員無事') return 'sc-ok';
  if (val.indexOf('重傷')>=0 || val==='出社困難' || val.indexOf('負傷')>=0) return 'sc-ng';
  return 'sc-unk';
}

function svLoad() {
  var empId = ((document.getElementById('sv-empId')||{}).value||'').trim();
  if (!empId) return;
  document.getElementById('sv-info').textContent    = '読み込み中...';
  document.getElementById('sv-table').style.display = 'none';
  document.getElementById('sv-tbody').innerHTML     = '';
  document.getElementById('sv-empty').style.display = 'none';
  google.script.run
    .withSuccessHandler(function(res){
      if (!res.success) { alert(res.message); document.getElementById('sv-info').textContent=''; return; }
      var data = res.data;
      var answered   = data.filter(function(r){ return r.answered === 'new'; }).length;
      var unanswered = data.length - answered;
      if (res.originTime) {
        document.getElementById('sv-origin').textContent = '📍 地震検知起点: ' + res.originTime + ' 以降の回答を有効とみなします';
      }
      // 訓練モードバナーの表示制御
      var drillBanner = document.getElementById('drill-banner');
      if (drillBanner) drillBanner.style.display = res.drillMode ? 'block' : 'none';
      document.getElementById('sv-info').textContent =
        '全' + data.length + '名中　回答済み: ' + answered + '名　未回答: ' + unanswered + '名';
      if (!data.length) { document.getElementById('sv-empty').style.display='block'; return; }
      document.getElementById('sv-table').style.display = 'table';
      document.getElementById('sv-tbody').innerHTML = data.map(function(r){
        var rowClass = r.answered === 'new' ? '' :
                       r.answered === 'old' ? ' class="row-old"' :
                       ' class="row-unanswered"';
        // 氏名は詳細ポップアップを開くリンク（data属性でデータを渡す）
        // showPersonalInfoがfalseの場合は個人情報を渡さずポップアップも開かない
        var showPI = r.showPersonalInfo !== false && r.showPersonalInfo !== 'false' && r.showPersonalInfo !== 0 && r.showPersonalInfo !== '0';
        var nameCell = '<span'
          + (showPI ? ' class="name-link"' : ' class="name-link no-detail"')
          + ' data-empid="'    + escHtml(String(r.empId)) + '"'
          + ' data-name="'     + escHtml(r.name)          + '"'
          + ' data-dept="'     + escHtml(r.dept)          + '"'
          + ' data-section="'  + escHtml(r.section)       + '"'
          + ' data-team="'     + escHtml(r.team)          + '"'
          + ' data-position="' + escHtml(r.position)      + '"'
          + (showPI ? ' data-address="'  + escHtml(r.address||'')   + '"' : '')
          + (showPI ? ' data-mobile="'   + escHtml(r.mobile||'')    + '"' : '')
          + (showPI ? ' data-email="'    + escHtml(r.email||'')     + '"' : '')
          + (showPI ? ' onclick="showDetail(this)"' : '')
          + '>'
          + escHtml(r.name) + '</span>';
        return '<tr' + rowClass + '>'
          +'<td>'+escHtml(r.dept)+'</td>'
          +'<td>'+escHtml(r.section)+'</td>'
          +'<td>'+escHtml(r.team)+'</td>'
          +'<td>'+nameCell+'</td>'
          +'<td class="'+svStatusClass(r.selfStatus)+'">'+escHtml(r.selfStatus||'')+'</td>'
          +'<td class="'+svStatusClass(r.familyStatus)+'">'+escHtml(r.familyStatus||'')+'</td>'
          +'<td>'+escHtml(r.location||'')+'</td>'
          +'<td class="'+svStatusClass(r.canWork)+'">'+escHtml(r.canWork||'')+'</td>'
          +'<td class="sc-other">'+escHtml(r.other||'')+'</td>'
          +'<td>'+escHtml(r.timestamp||'未回答')+'</td>'
          +'</tr>';
      }).join('');
    })
    .withFailureHandler(function(err){
      alert('エラー: '+err.message);
      document.getElementById('sv-info').textContent='';
    })
    .getSafetyData(empId);
}

// 詳細ポップアップ（data属性から読み取る）
function showDetail(el) {
  var d = el.dataset;
  document.getElementById('detail-name').textContent     = d.name     || '—';
  document.getElementById('detail-dept').textContent     =
    (d.dept||'') + ' ' + (d.section||'') + ' ' + (d.team||'');
  document.getElementById('detail-empid').textContent    = d.empid    || '—';
  document.getElementById('detail-position').textContent = d.position || '—';
  document.getElementById('detail-address').textContent  = d.address || '—';
  var mobileEl = document.getElementById('detail-mobile');
  if (d.mobile) { mobileEl.textContent = d.mobile; mobileEl.href = 'tel:' + d.mobile; }
  else          { mobileEl.textContent = '—';       mobileEl.removeAttribute('href'); }
  var emailEl = document.getElementById('detail-email');
  if (d.email) { emailEl.textContent = d.email; emailEl.href = 'mailto:' + d.email; }
  else         { emailEl.textContent = '—';      emailEl.removeAttribute('href'); }
  document.getElementById('detail-modal').classList.add('active');
}
function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('active');
}

// =============================================
// 安否報告リセット
// =============================================
function openResetModal() {
  document.getElementById('reset-input').value        = '';
  document.getElementById('reset-msg').style.display  = 'none';
  document.getElementById('reset-modal').classList.add('active');
  setTimeout(function(){ document.getElementById('reset-input').focus(); }, 100);
}
function closeResetModal() {
  document.getElementById('reset-modal').classList.remove('active');
}
function submitReset() {
  var pw = (document.getElementById('reset-input').value || '').trim();
  if (!pw) { showResetMsg('パスワードを入力してください。'); return; }
  var btn = document.getElementById('reset-ok-btn');
  btn.disabled = true; btn.textContent = '実行中...';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = 'リセット実行';
      if (!res.success) { showResetMsg(res.message); return; }
      closeResetModal();
      alert('✅ ' + res.message);
      svLoad();
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = 'リセット実行';
      showResetMsg('❌ ' + err.message);
    })
    .resetSafetyData(verifiedEmpId, pw);
}
function showResetMsg(msg) {
  var el = document.getElementById('reset-msg');
  el.textContent = msg; el.className = 'pin-msg error'; el.style.display = 'block';
}

// =============================================
// 起動
// =============================================
window.onload = function() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'block';

  // ブラウザバック時にPIN認証状態をクリア
  window.addEventListener('popstate', function() {
    verifiedEmpId = '';
    goPage('safety');
  });

  document.getElementById('empid-input').addEventListener('keypress', function(e){
    if (e.key==='Enter') doEmpIdLogin();
  });
  document.getElementById('pin-input').addEventListener('keypress', function(e){
    if (e.key==='Enter') submitPin();
  });

  // 前回の社員番号があれば入力欄にセット
  var savedId = localStorage.getItem('empId');
  if (savedId) document.getElementById('empid-input').value = savedId;
  document.getElementById('empid-screen').style.display = 'flex';
};
</script>
